services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spbnext_portal}
      POSTGRES_USER: ${POSTGRES_USER:-spbnext}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spbnext} -d ${POSTGRES_DB:-spbnext_portal}"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-spbnext}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-spbnext_portal}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
